name: pulse_flutter
description: Pulse - Smart Object Tracking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.0

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Permissions & Device
  permission_handler: ^11.3.0
  geolocator: ^11.0.0
  flutter_blue_plus: ^1.31.14
  image_picker: ^1.0.7

  # Camera — mobile (Android/iOS) + web
  camera: ^0.10.5+9

  # Camera — desktop (Windows/macOS/Linux)
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # Audio
  audioplayers: ^6.0.0
  speech_to_text: 7.3.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: 10.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true