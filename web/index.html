<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pulse_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>pulse_flutter</title>
  <link rel="manifest" href="manifest.json">

  <!-- TensorFlow.js + COCO-SSD (must load before flutter_bootstrap.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

  <style>
    /* Hidden video element — only used by COCO-SSD for frame analysis */
    #cocoVideoSource {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 320px;
      height: 240px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Hidden video that COCO-SSD runs inference on -->
  <video id="cocoVideoSource" autoplay playsinline muted></video>

  <script>
    let _cocoModel = null;
    let _videoStream = null;
    const _videoEl = document.getElementById('cocoVideoSource');

    // 1. Load model — Dart polls window._dartCocoReady to know when done
    window.cocoSsdReady = cocoSsd.load({ base: 'mobilenet_v2' }).then(model => {
      _cocoModel = model;
      console.log('[COCO-SSD] Model loaded ✓');
    }).catch(err => {
      console.error('[COCO-SSD] Failed to load model:', err);
    });

    // 2. Start webcam into hidden <video>
    window.startWebcam = async function () {
      if (_videoStream) return;
      try {
        _videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: 640, height: 480 },
          audio: false,
        });
        _videoEl.srcObject = _videoStream;
        await _videoEl.play();
        console.log('[Webcam] Stream started ✓');
      } catch (err) {
        console.error('[Webcam] Error:', err);
        throw err;
      }
    };

    // 3. Stop webcam
    window.stopWebcam = function () {
      if (_videoStream) {
        _videoStream.getTracks().forEach(t => t.stop());
        _videoStream = null;
        _videoEl.srcObject = null;
      }
    };

    // 4. Run one detection pass — called by Dart via JS interop
    window.runCocoSsd = function () {
      return new Promise(async (resolve, reject) => {
        if (!_cocoModel) { reject('Model not loaded yet'); return; }
        if (!_videoEl.srcObject || _videoEl.readyState < 2) { resolve([]); return; }
        try {
          const predictions = await _cocoModel.detect(_videoEl);
          const vw = _videoEl.videoWidth  || 640;
          const vh = _videoEl.videoHeight || 480;
          resolve(predictions.map(p => ({
            class:       p.class,
            score:       p.score,
            bbox:        p.bbox,  // [x, y, width, height] in pixels
            videoWidth:  vw,
            videoHeight: vh,
          })));
        } catch (err) {
          reject(err.toString());
        }
      });
    };
  </script>

  <!-- Flutter bootstrap — keep LAST -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
